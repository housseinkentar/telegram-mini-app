<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine's</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#d8f5d0, #bdecb6);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 340px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.text {
  margin-top: 15px;
  font-size: 14px;
  color: #333;
}

.btn {
  margin-top: 20px;
  background: #2ea6ff;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Valentine's</div>

  <div class="text">
    Para acceder a los archivos completamente gratis 💦<br><br>
    👇 Confirma que no eres un robot
  </div>

  <button class="btn" onclick="verify()">👇 أنا لست روبوت</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function verify() {
  tg.sendData("verified");
  tg.close();
}
</script>

</body>
</html>
