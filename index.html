<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentine's</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 320px;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2ea6ff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Valentine's</h2>
  <p>Confirm that you are not a robot</p>

  <button onclick="verify()">✅ أنا لست روبوت</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  function verify() {
    tg.sendData("verified");
    tg.close();
  }
</script>

</body>
</html>
